# 宿主机 Nginx 反代到 Docker（可选）
# 容器映射端口见 .env 的 WALLE_HTTP_PORT，默认 8080
#
#   sudo cp docker/nginx-host.example.conf /etc/nginx/sites-available/walle-web
#   sudo ln -s /etc/nginx/sites-available/walle-web /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name walle.example.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 64m;
    }
}
